<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- SEO -->
  <title>RaktPort — Donate Blood Anywhere, Save Everywhere</title>
  <meta name="description" content="India's unified blood donation platform. Find donors, book appointments, manage blood banks, and save lives with RaktPort." />
  <meta name="keywords" content="blood donation, blood bank, donate blood, RaktPort, India, blood donor, save lives" />
  <meta name="author" content="RaktPort" />
  <link rel="canonical" href="https://raktport.in/" />

  <!-- Semantic Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "RaktPort",
    "url": "https://raktport.in/",
    "description": "India's unified blood donation platform. Find donors, book appointments, manage blood banks, and save lives.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://raktport.in/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "RaktPort",
    "url": "https://raktport.in/",
    "logo": "https://raktport.in/icon-512.png"
  }
  </script>

  <!-- PWA Meta -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8B0000" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RaktPort" />
  <link rel="apple-touch-icon" href="/icon-180.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" href="/favicon.ico" />

  <!-- Google Fonts: Inter (Standard) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="RaktPort — Donate Blood Anywhere, Save Everywhere" />
  <meta property="og:description" content="India's unified blood donation platform. Find donors, book appointments, and save lives." />
  <meta property="og:image" content="/icon-512.png" />
  <meta property="og:url" content="https://raktport.in" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="RaktPort" />
  <meta name="twitter:description" content="Donate Blood Anywhere. Save Everywhere." />
  <meta name="twitter:image" content="/icon-512.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
