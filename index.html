  <!-- SEO -->
  <title>RaktPort — Donate Blood Anywhere, Save Everywhere | India's Blood Network</title>
  <meta name="description"
    content="RaktPort is India's unified digital blood donation platform. Donate blood anywhere, track every unit via RTID, find verified blood banks near you, and save up to 3 lives per donation. NACO compliant & MoHFW verified." />
  <meta name="keywords" content="blood donation India, donate blood, find blood bank, blood donor registration, RTID blood tracking, emergency blood request, RaktPort, e-RaktKosh alternative, blood compatibility chart, blood donation eligibility, NACO blood bank, MoHFW blood donation, blood group O negative, universal donor" />
  <meta name="author" content="RaktPort" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <link rel="canonical" href="https://raktport.in/" />
  <meta name="geo.region" content="IN" />
  <meta name="geo.placename" content="India" />

  <!-- Structured Data: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "RaktPort",
    "url": "https://raktport.in/",
    "description": "India's unified digital blood donation platform. Donate blood anywhere using RTID technology, track every unit from collection to transfusion, and save up to 3 lives per donation.",
    "inLanguage": "en-IN",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://raktport.in/search?city={city}&blood={blood_group}",
      "query-input": "required name=city"
    }
  }
  </script>
  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "RaktPort",
    "url": "https://raktport.in/",
    "logo": "https://raktport.in/raktport-logo.png",
    "sameAs": [],
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+91-1800-180-1104",
      "contactType": "customer support",
      "areaServed": "IN",
      "availableLanguage": ["English", "Hindi"]
    }
  }
  </script>
  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is RaktPort?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "RaktPort is a digital infrastructure that enables location-independent blood donation and utilization through a unique RTID (RaktPort Transfusion ID) system. It allows a donor to donate at one place while the benefit can be utilized for a patient elsewhere."
        }
      },
      {
        "@type": "Question",
        "name": "How is RaktPort different from e-RaktKosh?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "e-RaktKosh manages blood inventory locally, whereas RaktPort enables interoperable donation value transfer across locations. e-RaktKosh is a storage system; RaktPort is a transfer system."
        }
      },
      {
        "@type": "Question",
        "name": "What is the RTID system?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "RTID (RaktPort Transfusion ID) is a unique, trackable digital ID assigned to each donation. It enables linking donor to donation to patient, tracking usage across locations, and creating a portable donation credit."
        }
      },
      {
        "@type": "Question",
        "name": "Does RaktPort replace blood banks?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Blood banks still collect, test, store, and transfuse blood. RaktPort only adds a coordination and tracking layer across locations."
        }
      },
      {
        "@type": "Question",
        "name": "Is RaktPort legally compliant?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. RaktPort involves no physical transfer without hospital control, no commercialization, and works within the voluntary donation framework. It manages tracking and allocation logic, not medical procedures."
        }
      },
      {
        "@type": "Question",
        "name": "How is transparency ensured in RaktPort?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Through RTID, every donation is traceable, every usage is recorded, and there is no ambiguity in donor contribution."
        }
      }
    ]
  }
  </script>
